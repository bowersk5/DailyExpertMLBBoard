<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Daily Expert MLB Board</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Syne:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>

    <!-- Ambient background -->
    <div class="ambient" aria-hidden="true">
      <div class="ambient-orb ambient-orb--1"></div>
      <div class="ambient-orb ambient-orb--2"></div>
      <div class="ambient-orb ambient-orb--3"></div>
    </div>

    <header class="site-header">
      <div class="header-inner">
        <div class="header-brand">
          <div class="brand-lockup">
            <div class="brand-icon">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
            </div>
            <div class="brand-text">
              <span class="brand-label">Expert MLB Board</span>
              <h1 class="brand-title">Daily Picks</h1>
            </div>
          </div>
        </div>
        <div class="header-meta">
          <div class="pulse-indicator">
            <span class="pulse-dot"></span>
            <span class="pulse-text">Live</span>
          </div>
          <div class="divider-v"></div>
          <div class="stat-chip">
            <span class="stat-chip__label">Sources</span>
            <strong id="gameCount" class="stat-chip__value">—</strong>
          </div>
          <div class="stat-chip">
            <span class="stat-chip__label">Consensus</span>
            <strong id="pickCount" class="stat-chip__value">—</strong>
          </div>
          <div class="divider-v"></div>
          <div class="header-time">
            <span class="time-label">Updated</span>
            <strong id="fetchedAt" class="time-value">—</strong>
          </div>
        </div>
        <div class="header-actions">
          <a id="sourceLink" class="btn-ghost" href="https://www.covers.com/picks/mlb" target="_blank" rel="noreferrer">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            Source
          </a>
          <button id="refreshButton" class="btn-primary" type="button">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            Refresh
          </button>
        </div>
      </div>
    </header>

    <!-- Stale data warning — hidden by JS until data is >10 h old -->
    <div id="staleWarning" class="stale-banner" hidden>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Picks data may be outdated. Trigger a refresh or wait for the next scheduled build.
    </div>

    <main class="main-content">
      <div class="page-layout">
        <section class="consensus-section">
          <div class="section-header">
            <div class="section-header__top">
              <span class="section-eyebrow">Consensus</span>
            </div>
            <div class="sport-tabs" aria-label="Sport pages">
              <a class="sport-tab" href="./" data-sport-link="mlb">MLB</a>
              <a class="sport-tab" href="nba/" data-sport-link="nba">NBA</a>
              <a class="sport-tab" href="nhl/" data-sport-link="nhl">NHL</a>
            </div>
            <h2 id="sportTitle" class="section-title">Most Agreed Picks</h2>
            <p id="consensusIntro" class="section-sub"></p>

            <!-- Market filter bar — populated by JS -->
            <div id="marketFilters" class="market-filters" role="group" aria-label="Filter by market"></div>
          </div>

          <div id="consensusList" class="consensus-stack"></div>
        </section>
      </div>
    </main>

    <!-- Parlay Builder drawer — hidden until at least 1 pick is added -->
    <aside id="parlayDrawer" class="parlay-drawer is-collapsed" hidden aria-label="Parlay builder">
      <div class="parlay-header">
        <div class="parlay-header__left">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          <span class="parlay-title">Parlay Slip</span>
          <span id="parlayCount" class="parlay-badge">0</span>
        </div>
        <div class="parlay-header__right">
          <button id="parlayToggle" class="parlay-toggle" aria-label="Toggle parlay drawer" aria-expanded="false">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
          </button>
        </div>
      </div>

      <div class="parlay-body">
        <div id="parlayList" class="parlay-legs"></div>

        <div class="parlay-calc">
          <div class="parlay-calc__row">
            <label class="parlay-calc__label" for="parlayStake">Stake ($)</label>
            <input id="parlayStake" class="parlay-calc__input" type="number" value="100" min="1" step="1">
          </div>
          <div class="parlay-calc__row">
            <span class="parlay-calc__label">Combined odds</span>
            <strong id="parlayOdds" class="parlay-calc__value">—</strong>
          </div>
          <div class="parlay-calc__row">
            <span class="parlay-calc__label">Payout</span>
            <strong id="parlayPayout" class="parlay-calc__value parlay-calc__value--payout">—</strong>
          </div>
        </div>

        <button id="clearParlay" class="parlay-clear">Clear slip</button>
      </div>
    </aside>

    <template id="consensusTemplate">
      <article class="consensus-card">
        <div class="consensus-card__header">
          <span class="badge badge--market market"></span>
          <span class="consensus-agree">
            <span class="agree-num agreement"></span>
            <span class="agree-label">sources</span>
          </span>
        </div>
        <h3 class="consensus-selection selection"></h3>
        <p class="consensus-matchup matchup"></p>
        <div class="consensus-meta">
          <span class="consensus-sources source-list"></span>
          <span class="consensus-experts">
            <strong class="pick-count"></strong> experts
          </span>
        </div>
        <p class="consensus-examples example-list"></p>
        <p class="full-analysis" hidden></p>
        <div class="consensus-actions">
          <button class="expand-analysis text-btn" hidden>Read analysis ↓</button>
          <button class="add-parlay-btn parlay-add-btn">+ Parlay</button>
        </div>
      </article>
    </template>

    <script type="module" src="app.js"></script>
  </body>
</html>
